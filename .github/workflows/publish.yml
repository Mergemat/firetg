name: Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.12'

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

      - name: Verify release tag
        if: github.event_name == 'push'
        run: |
          version="$(bun pm pkg get version | tr -d '"')"
          tag="${GITHUB_REF_NAME#v}"

          if [ "$version" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $version"
            exit 1
          fi

          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release commit must be reachable from main"
            exit 1
          fi

      - name: Verify npm version is new
        run: |
          name="$(bun pm pkg get name | tr -d '"')"
          version="$(bun pm pkg get version | tr -d '"')"

          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "$name@$version already exists on npm"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
